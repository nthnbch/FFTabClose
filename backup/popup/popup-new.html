<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>FFTabClose</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <h1 class="popup-title" id="extensionName">FFTabClose</h1>
      <div class="popup-actions">
        <a href="../info/info.html" id="infoLink" target="_blank" rel="noopener noreferrer" class="button button-secondary button-small">
          <span class="icon">ℹ️</span>
          <span id="infoText">Info</span>
        </a>
      </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
    </div>

    <!-- Stats Overview -->
    <div id="stats-container" class="stats-overview" style="display: none;">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="totalTabs">0</div>
          <div class="stat-label" id="totalTabsLabel">Total Tabs</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="activeTabs">0</div>
          <div class="stat-label" id="activeTabsLabel">Active Tabs</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="inactiveTabs">0</div>
          <div class="stat-label" id="inactiveTabsLabel">Inactive Tabs</div>
        </div>
      </div>
      
      <div id="eligibleContainer">
        <div class="stat-item">
          <div class="stat-value" id="eligibleTabs">0</div>
          <div class="stat-label" id="eligibleTabsLabel">Eligible for Close</div>
        </div>
        <div class="progress-bar">
          <div class="progress-value" id="eligibleProgress" style="width: 0%;"></div>
        </div>
      </div>

      <div class="workspace-actions">
        <button id="closeOldTabsButton" class="button button-primary">
          <span class="icon">🗑️</span>
          <span id="closeOldTabsText">Close Old Tabs</span>
        </button>
      </div>
    </div>

    <!-- Workspaces Section -->
    <div id="workspaces-container" class="workspaces-container" style="display: none;">
      <div class="workspace-section-title">
        <span id="workspacesTitle">Workspaces</span>
        <span id="workspacesCount">(0)</span>
      </div>
      
      <div id="workspace-list" class="workspace-list">
        <!-- Workspace cards will be inserted here -->
      </div>
    </div>

    <!-- Settings Link -->
    <a href="#" id="settingsLink" class="settings-link">
      <span class="icon">⚙️</span>
      <span id="settingsText">Settings</span>
    </a>

    <!-- Footer -->
    <div class="footer">
      <span id="versionInfo">Version 3.1.0</span>
      <a href="https://github.com/nthnbch/FFTabClose" target="_blank" rel="noopener noreferrer" id="githubLink">GitHub</a>
    </div>
  </div>

  <!-- Templates -->
  <template id="workspace-card-template">
    <div class="workspace-card">
      <div class="workspace-header">
        <div class="workspace-title">
          <span class="icon workspace-icon">📁</span>
          <span class="workspace-name">Workspace Name</span>
          <span class="workspace-badge workspace-type">Type</span>
        </div>
        <div class="workspace-tab-count">0 tabs</div>
      </div>
      <div class="workspace-tabs">
        <div class="workspace-stats">
          <div class="workspace-stat">
            <div class="workspace-stat-value workspace-active">0</div>
            <div class="workspace-stat-label" id="workspaceActiveLabel">Active</div>
          </div>
          <div class="workspace-stat">
            <div class="workspace-stat-value workspace-inactive">0</div>
            <div class="workspace-stat-label" id="workspaceInactiveLabel">Inactive</div>
          </div>
          <div class="workspace-stat">
            <div class="workspace-stat-value workspace-eligible">0</div>
            <div class="workspace-stat-label" id="workspaceEligibleLabel">Eligible</div>
          </div>
        </div>
        <div class="workspace-actions">
          <button class="button button-secondary button-small workspace-close-button">
            <span class="icon">🗑️</span>
            <span id="workspaceCloseText">Close Inactive</span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script src="../browser-polyfill.min.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
