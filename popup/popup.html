<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tab Auto Closer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 id="settings-title"></h1>
    
    <div class="form-group">
      <label>
        <input type="checkbox" id="enabled">
        <span id="auto-close-enabled-label"></span>
      </label>
    </div>
    
    <div class="form-group">
      <label for="closeAfterHours" id="close-after-hours-label"></label>
      <input type="number" id="closeAfterHours" min="1" max="720" step="1">
    </div>
    
    <div class="form-group">
      <label>
        <input type="checkbox" id="excludePinnedTabs">
        <span id="exclude-pinned-tabs-label"></span>
      </label>
    </div>
    
    <button id="save-button" class="btn"></button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="../browser-polyfill.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
