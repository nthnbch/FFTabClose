<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FFTabClose</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../icons/icon-48.svg" alt="FFTabClose" class="logo">
      <h1 id="settings-title"></h1>
    </div>
    
    <div class="form-group switch-container">
      <label class="switch">
        <input type="checkbox" id="enabled">
        <span class="slider round"></span>
      </label>
      <span id="auto-close-enabled-label" class="switch-label"></span>
    </div>
    
    <div class="form-group">
      <label for="timeSelector" id="close-after-hours-label"></label>
      <div class="time-selector-container">
        <select id="timeSelector" class="time-selector">
          <option value="0.016667">1 minute (test)</option>
          <option value="1">1 heure</option>
          <option value="8">8 heures</option>
          <option value="12">12 heures</option>
          <option value="24">24 heures</option>
          <option value="custom">Personnalisé</option>
        </select>
        <div id="customTimeContainer" class="custom-time-container" style="display: none;">
          <input type="number" id="customHours" min="0" max="720" step="1" placeholder="Heures">
          <input type="number" id="customMinutes" min="0" max="59" step="1" placeholder="Minutes">
        </div>
      </div>
    </div>
    
    <div class="form-group switch-container">
      <label class="switch">
        <input type="checkbox" id="excludePinnedTabs">
        <span class="slider round"></span>
      </label>
      <span id="exclude-pinned-tabs-label" class="switch-label"></span>
    </div>
    
    <button id="save-button" class="btn"></button>
    
    <div id="status" class="status"></div>
  </div>

  <script src="../browser-polyfill.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
